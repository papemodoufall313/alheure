<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Background blue -->
  <rect width="600" height="200" fill="#0e2b62"/>

  <!-- Red accent line top -->
  <rect x="0" y="0" width="600" height="6" fill="#c8302a"/>
  <!-- Red accent line bottom -->
  <rect x="0" y="194" width="600" height="6" fill="#c8302a"/>

  <!-- Left red accent -->
  <rect x="30" y="20" width="4" height="160" fill="#c8302a" opacity="0.7"/>

  <!-- Logo -->
  <text x="55" y="95" font-family="Georgia, serif" font-size="56" font-weight="bold" font-style="italic" fill="white">À l'Heure</text>

  <!-- Tagline -->
  <text x="55" y="125" font-family="Arial, sans-serif" font-size="14" fill="#8090b0" letter-spacing="2">LE QUOTIDIEN D'INFORMATION</text>

  <!-- Right side: newsletter info -->
  <rect x="340" y="50" width="230" height="100" fill="#0a1e45" rx="4"/>
  <text x="455" y="90" font-family="Arial, sans-serif" font-size="13" fill="#8090b0" text-anchor="middle" letter-spacing="2">LA NEWSLETTER</text>
  <text x="455" y="115" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">QUOTIDIENNE</text>
  <text x="455" y="138" font-family="Arial, sans-serif" font-size="12" fill="#c8302a" text-anchor="middle">alheure.info</text>

  <!-- Bottom tagline -->
  <text x="300" y="175" font-family="Arial, sans-serif" font-size="11" fill="#405070" text-anchor="middle" letter-spacing="2">RIGUEUR · INDÉPENDANCE · PROXIMITÉ · INNOVATION</text>
</svg>
