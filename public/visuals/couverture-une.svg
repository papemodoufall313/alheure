<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 794 1123" width="794" height="1123">
  <!-- A4 portrait - journal front page template -->

  <!-- Background -->
  <rect width="794" height="1123" fill="#f5f3ee"/>

  <!-- Header band -->
  <rect x="0" y="0" width="794" height="130" fill="#0e2b62"/>

  <!-- Red accent under header -->
  <rect x="0" y="130" width="794" height="6" fill="#c8302a"/>

  <!-- Logo -->
  <text x="397" y="75" font-family="Georgia, serif" font-size="64" font-weight="bold" font-style="italic" fill="white" text-anchor="middle">À l'Heure</text>

  <!-- Sub-header info bar -->
  <rect x="0" y="136" width="794" height="32" fill="#f0ece4"/>
  <rect x="0" y="136" width="794" height="1" fill="#c8302a"/>
  <rect x="0" y="167" width="794" height="1" fill="#c8302a"/>
  <text x="20" y="157" font-family="Arial, sans-serif" font-size="11" fill="#0e2b62">JEUDI 29 JANVIER 2026  |  N° 001  |  PRIX : 100 FCFA  |  WWW.ALHEURE.SN  |  ISSN : 3020-0001</text>

  <!-- LE QUOTIDIEN D'INFORMATION -->
  <text x="397" y="112" font-family="Arial, sans-serif" font-size="13" fill="#a8b4cf" text-anchor="middle" letter-spacing="3">LE QUOTIDIEN D'INFORMATION</text>

  <!-- Main headline area -->
  <rect x="20" y="185" width="500" height="280" fill="#0e2b62" rx="2"/>
  <text x="40" y="255" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white">TITRE PRINCIPAL</text>
  <text x="40" y="305" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white">DE LA UNE</text>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="18" fill="#c8d0e0">Chapeau de l'article à la une</text>
  <text x="40" y="390" font-family="Arial, sans-serif" font-size="18" fill="#c8d0e0">du quotidien, en quelques mots.</text>
  <rect x="40" y="430" width="120" height="28" fill="#c8302a"/>
  <text x="100" y="449" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">RUBRIQUE</text>

  <!-- Image placeholder right -->
  <rect x="534" y="185" width="240" height="280" fill="#ddd" rx="2"/>
  <text x="654" y="320" font-family="Arial, sans-serif" font-size="14" fill="#aaa" text-anchor="middle">PHOTO UNE</text>
  <text x="654" y="340" font-family="Arial, sans-serif" font-size="12" fill="#bbb" text-anchor="middle">240 × 280</text>

  <!-- Separator -->
  <rect x="20" y="480" width="754" height="2" fill="#0e2b62"/>

  <!-- Secondary articles -->
  <!-- Article 2 -->
  <rect x="20" y="492" width="360" height="180" fill="white" rx="2"/>
  <rect x="20" y="492" width="360" height="5" fill="#c8302a"/>
  <text x="40" y="525" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#0e2b62">Titre article secondaire</text>
  <text x="40" y="555" font-family="Arial, sans-serif" font-size="13" fill="#505050">Texte d'accroche du deuxième</text>
  <text x="40" y="573" font-family="Arial, sans-serif" font-size="13" fill="#505050">article important de la journée</text>
  <text x="40" y="591" font-family="Arial, sans-serif" font-size="13" fill="#505050">en quelques lignes courtes.</text>

  <!-- Article 3 -->
  <rect x="394" y="492" width="380" height="180" fill="white" rx="2"/>
  <rect x="394" y="492" width="380" height="5" fill="#0e2b62"/>
  <text x="414" y="525" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#0e2b62">Troisième article du jour</text>
  <text x="414" y="555" font-family="Arial, sans-serif" font-size="13" fill="#505050">Accroche du troisième article</text>
  <text x="414" y="573" font-family="Arial, sans-serif" font-size="13" fill="#505050">affiché sur la une du journal</text>
  <text x="414" y="591" font-family="Arial, sans-serif" font-size="13" fill="#505050">quotidien À l'Heure.</text>

  <!-- Separator -->
  <rect x="20" y="685" width="754" height="1" fill="#ddd"/>

  <!-- Bottom articles row -->
  <text x="40" y="720" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#0e2b62">Brève 1 : Titre court ici</text>
  <text x="40" y="740" font-family="Arial, sans-serif" font-size="12" fill="#707070">Texte de la brève sur une ligne</text>
  <text x="280" y="720" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#0e2b62">Brève 2 : Autre titre</text>
  <text x="280" y="740" font-family="Arial, sans-serif" font-size="12" fill="#707070">Texte de la brève en une ligne</text>
  <text x="520" y="720" font-family="Georgia, serif" font-size="17" font-weight="bold" fill="#0e2b62">Brève 3 : Titre ici</text>
  <text x="520" y="740" font-family="Arial, sans-serif" font-size="12" fill="#707070">Texte de la brève ici</text>

  <!-- Vertical dividers -->
  <rect x="268" y="690" width="1" height="80" fill="#ddd"/>
  <rect x="508" y="690" width="1" height="80" fill="#ddd"/>

  <!-- Sport / Economy strip -->
  <rect x="20" y="790" width="754" height="2" fill="#0e2b62"/>
  <rect x="20" y="800" width="754" height="60" fill="#0e2b62"/>
  <text x="397" y="822" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a8b4cf" text-anchor="middle" letter-spacing="3">SPORT · ÉCONOMIE · CULTURE · SOCIÉTÉ</text>
  <text x="397" y="845" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle">Titre brève sport ou économie en résumé</text>

  <!-- Footer -->
  <rect x="0" y="1070" width="794" height="53" fill="#0e2b62"/>
  <rect x="0" y="1070" width="794" height="4" fill="#c8302a"/>
  <text x="397" y="1100" font-family="Arial, sans-serif" font-size="13" fill="#8090b0" text-anchor="middle" letter-spacing="2">alheure.info  ·  RIGUEUR · INDÉPENDANCE · PROXIMITÉ · INNOVATION</text>
  <text x="397" y="1115" font-family="Arial, sans-serif" font-size="11" fill="#50607a" text-anchor="middle">© À l'Heure 2026  —  ISSN 3020-0001</text>
</svg>
